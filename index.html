<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meine Links</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* Folien-Container */
    .folie {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 2rem;
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
    }

    /* Kopf der Folie */
    .kopf {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 3px solid #667eea;
    }

    .kopf h1 {
      font-size: 2rem;
      color: #333;
      margin-bottom: 0.5rem;
    }

    .kopf p {
      color: #666;
    }

    /* Jeder Link ist eine eigene Folie (Karte) */
    .link-folie {
      display: block;
      background: #f8f9fa;
      margin-bottom: 1rem;
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      text-decoration: none;
      color: #333;
      border-left: 5px solid #667eea;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .link-folie:hover {
      transform: translateX(8px);
      background: #f0f2ff;
      border-left: 8px solid #764ba2;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* Links-Zeichen groß */
    .link-folie .zeichen {
      font-size: 1.8rem;
      margin-right: 1rem;
      display: inline-block;
    }

    .link-folie .info {
      display: inline-block;
      vertical-align: middle;
    }

    .link-folie .titel {
      font-weight: bold;
      font-size: 1.2rem;
    }

    .link-folie .beschreibung {
      font-size: 0.85rem;
      color: #666;
      margin-top: 0.2rem;
    }

    /* Footer */
    .fuss {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #888;
      padding-top: 1rem;
      border-top: 1px solid #ddd;
    }

    /* Anleitung für mich (wird auf der Seite angezeigt) */
    .anleitung {
      background: #e8eaff;
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .anleitung h3 {
      color: #667eea;
      margin-bottom: 0.5rem;
    }

    .anleitung code {
      background: white;
      padding: 0.2rem 0.5rem;
      border-radius: 0.5rem;
      font-family: monospace;
    }

    @media (max-width: 600px) {
      .folie {
        padding: 1.2rem;
      }
      .link-folie .zeichen {
        font-size: 1.3rem;
        margin-right: 0.7rem;
      }
      .link-folie .titel {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<div class="folie">

  </div>
