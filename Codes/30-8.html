 <!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Persisch · Deutsch · Englisch Lernkarten</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* verhindert ungewolltes markieren, kein Eingriff in Klick */
    }

    body {
      background: linear-gradient(145deg, #0a0c12 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
      padding: 1rem;
      overflow-x: hidden;
    }

    /* Hauptcontainer */
    .app-container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    /* Kartencontainer – 3D Flip */
    .card-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      perspective: 1500px;
      cursor: pointer;
    }

    .flip-card {
      background: transparent;
      width: 100%;
      aspect-ratio: 3 / 2;
      position: relative;
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      transform-style: preserve-3d;
      border-radius: 2rem;
    }

    .flipped {
      transform: rotateY(180deg);
    }

    /* Vorder- & Rückseite */
    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 2rem;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      background: #1e293b;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow-y: auto;
    }

    .front {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border: 1px solid rgba(251,191,36,0.3);
    }

    .back {
      background: linear-gradient(135deg, #0a2416 0%, #064e3b 100%);
      transform: rotateY(180deg);
      border: 1px solid rgba(74,222,128,0.4);
      direction: rtl;
    }

    /* gemeinsame text farben */
    .german-word {
      font-size: clamp(22px, 7vw, 32px);
      font-weight: 800;
      color: #fbbf24;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .english-word {
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 500;
      color: #e2e8f0;
      background: rgba(255,255,240,0.08);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0.75rem;
      border-radius: 40px;
      width: fit-content;
      margin-bottom: 0.9rem;
    }

    .example-sentence {
      font-size: clamp(13px, 3.5vw, 16px);
      color: #cbd5e1;
      background: rgba(0,0,0,0.3);
      padding: 0.7rem;
      border-radius: 1rem;
      margin: 0.5rem 0;
      font-style: italic;
    }

    .grammar-box {
      background: #1e293b;
      color: #f1f5f9;
      padding: 0.8rem;
      border-radius: 1rem;
      margin-top: auto;
      font-size: clamp(12px, 3vw, 14px);
      border-left: 4px solid #fbbf24;
      word-break: break-word;
    }

    .grammar-box strong {
      color: #facc15;
    }

    /* Persische Rückseite */
    .persian-word {
      font-size: clamp(20px, 6vw, 28px);
      font-weight: 800;
      color: #4ade80;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      direction: rtl;
    }

    .persian-sentence {
      font-size: clamp(14px, 4vw, 18px);
      color: #bbf7d0;
      background: rgba(0,0,0,0.3);
      padding: 0.8rem;
      border-radius: 1rem;
      direction: rtl;
      word-break: break-word;
      line-height: 1.5;
    }

    .persian-label {
      font-size: 12px;
      color: #86efac;
      margin-bottom: 0.25rem;
      display: block;
    }

    /* Buttons Leiste */
    .nav-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 0.5rem;
      width: 100%;
    }

    button {
      background: #1e293b;
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 18px;
      min-width: 70px;
      min-height: 48px;
      border-radius: 60px;
      font-size: 1rem;
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 0.3px;
      border: 1px solid rgba(251,191,36,0.2);
    }

    button:active {
      transform: scale(0.96);
      background: #2d3a54;
    }

    .random-btn {
      background: #fbbf24;
      color: #0f172a;
      font-weight: 800;
    }

    .random-active {
      background: #4ade80;
      color: #0a0c12;
      border: 2px solid #fbbf24;
      box-shadow: 0 0 8px #4ade80;
    }

    .badge {
      background: #000000aa;
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: bold;
      color: #fbbf24;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* responsive Konjugation */
    .conjugation-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px 12px;
      margin-top: 6px;
    }

    @media (max-width: 600px) {
      body { padding: 0.75rem; }
      .front, .back { padding: 1rem; }
      .conjugation-grid { grid-template-columns: 1fr; gap: 4px; }
      button { padding: 10px 12px; min-width: 65px; font-size: 0.85rem; }
      .grammar-box { font-size: 11px; }
    }

    @media (max-width: 480px) {
      .nav-bar { gap: 0.5rem; }
      button { min-width: 58px; padding: 8px 10px; font-size: 0.8rem; }
      .flip-card { aspect-ratio: 3 / 2.2; }
    }

    @media (max-width: 380px) {
      .german-word { font-size: clamp(20px, 6vw, 28px); }
      .persian-word { font-size: clamp(18px, 5.5vw, 24px); }
      .grammar-box { font-size: 10px; }
    }

    .speaker-icon {
      cursor: pointer;
      background: #334155;
      border-radius: 50%;
      padding: 4px;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
    }
    .speaker-icon:active { transform: scale(0.9); background: #fbbf24; color: black;}

    /* Scroll innerhalb Karte */
    .front::-webkit-scrollbar, .back::-webkit-scrollbar { width: 3px; }
    .footer-badge { margin-top: 6px; text-align: center; font-size: 11px; color: #94a3b8; }
  </style>
</head>

      <div class="german-word">
        <span>${card.german}</span>
        <span class="speaker-icon" data-lang="de-DE" data-text="${card.german.replace(/"/g, '&quot;')}">🔊</span>
      </div>
      <div class="english-word">
        ${card.english}
        <span class="speaker-icon" data-lang="en-US" data-text="${card.english.replace(/"/g, '&quot;')}">🔊</span>
      </div>
      <div class="example-sentence">📖 ${card.example_de}</div>
      ${grammarHtml}
    `;

    // ---- RÜCKSEITE (Persisch) ----
    backDiv.innerHTML = `
      <div class="persian-word">
        <span>${card.persian}</span>
        <span class="speaker-icon" data-lang="fa-IR" data-text="${card.persian.replace(/"/g, '&quot;')}">🔊</span>
      </div>
      <div class="persian-sentence">
        <span class="persian-label">فارسی:</span> ${card.persian_ex}
      </div>
      <div style="margin-top:auto; font-size:12px; direction:ltr; text-align:left; opacity:0.6;">🔁 Vorderseite antippen</div>
    `;

    // Speaker Event Binding nach DOM injection (Event Delegation)
    attachSpeakerEvents();
  }

  function attachSpeakerEvents() {
    const frontSpeakers = frontDiv.querySelectorAll('.speaker-icon');
    const backSpeakers = backDiv.querySelectorAll('.speaker-icon');
    [...frontSpeakers, ...backSpeakers].forEach(icon => {
      icon.removeEventListener('click', speakerHandler);
      icon.addEventListener('click', speakerHandler);
    });
  }

  function speakerHandler(e) {
    e.stopPropagation();
    const text = this.getAttribute('data-text');
    const lang = this.getAttribute('data-lang');
    if (text) speakText(text, lang);
  }

  // flip reset (immer Vorderseite nach Navigation)
  function resetFlipToFront() {
    if (flipCardEl.classList.contains('flipped')) {
      flipCardEl.classList.remove('flipped');
    }
    currentFlipState = false;
  }

  // Navigation mit Random-Modus
  function goToIndex(newIndex) {
    if (randomMode) {
      // Zufälligen Index aus der gesamten Kartenanzahl
      newIndex = Math.floor(Math.random() * cardsData.length);
    } else {
      if (newIndex < 0) newIndex = cardsData.length - 1;
      if (newIndex >= cardsData.length) newIndex = 0;
    }
    currentIndex = newIndex;
    renderCurrentCard();
    resetFlipToFront();
  }

  function nextCard() { goToIndex(currentIndex + 1); }
  function prevCard() { goToIndex(currentIndex - 1); }
  function randomCard() { goToIndex(Math.floor(Math.random() * cardsData.length)); }

  function toggleRandomModeOnRightClick(e) {
    e.preventDefault();
    randomMode = !randomMode;
    updateRandomBadge();
    if (randomMode) {
      // sofort zufällige Karte
      randomCard();
    } else {
      // bleibt auf aktueller Karte
    }
    randomBtn.classList.toggle('random-active', randomMode);
  }

  function updateRandomBadge() {
    if (randomMode) {
      badgeContainer.innerHTML = '<div class="badge">🎲 ZUFALLSMODUS AKTIV (Rechtsklick beendet)</div>';
    } else {
      badgeContainer.innerHTML = '';
    }
  }

  // Klick auf Karte umdrehen
  function handleCardFlip() {
    flipCardEl.classList.toggle('flipped');
    currentFlipState = flipCardEl.classList.contains('flipped');
  }

  // Event listener
  const cardContainer = document.querySelector('.card-container');
  cardContainer.addEventListener('click', (e) => {
    // Vermeide wenn speaker geklickt -> verhindert doppeltes flippen
    if (e.target.classList && e.target.classList.contains('speaker-icon')) return;
    handleCardFlip();
  });

  prevBtn.addEventListener('click', () => { if (randomMode) randomCard(); else prevCard(); });
  nextBtn.addEventListener('click', () => { if (randomMode) randomCard(); else nextCard(); });
  randomBtn.addEventListener('click', (e) => { randomCard(); });
  randomBtn.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    toggleRandomModeOnRightClick(e);
  });

  // initial Render
  currentIndex = 0;
  renderCurrentCard();
  resetFlipToFront();
  updateRandomBadge();
  randomBtn.classList.remove('random-active');
</script>
</body>
</html>
