 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persisch Flashcards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: linear-gradient(145deg, #16213e, #0f3460);
            border-radius: 30px;
            padding: 40px 20px;
            margin: 20px 0;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.3s;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #e94560;
            text-align: center;
        }
        .card:active {
            transform: scale(0.98);
        }
        .deutsch {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .persisch {
            font-size: 32px;
            color: #e94560;
            font-weight: bold;
            direction: rtl;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .persisch-script {
            font-family: 'Noto Naskh Arabic', 'Traditional Arabic', serif;
        }
        .counter {
            color: #aaa;
            text-align: center;
            margin: 10px 0;
            font-size: 16px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: #e94560;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(233,69,96,0.4);
        }
        button.secondary {
            background: #0f3460;
            color: #e94560;
        }
        .hint {
            color: #888;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="counter" id="counter">1 / 44</div>
        <div class="card" onclick="flipCard()">
            <div id="german" class="deutsch">hochbegabt</div>
            <div id="persian" class="persisch persisch-script" style="display: none;">بااستعداد بودن</div>
        </div>
        <div class="button-group">
            <button class="secondary" onclick="prevCard()">← Vorherige</button>
            <button onclick="nextCard()">Nächste →</button>
        </div>
        <div class="hint">👆 Auf Karte tippen = umdrehen</div>
    </div>

    <script>
        // DEINE KOMPLETTE LISTE (44 Karten)
        const cards = [
            {de: "hochbegabt", fa: "بااستعداد بودن"},
            {de: "distanzieren", fa: "فاصله گرفتن"},
            {de: "jemanden auf die Schippe nehmen", fa: "مسخره کردن"},
            {de: "Expertin", fa: "متخصص بودن"},
            {de: "Konversation", fa: "گفتگو کردن"},
            {de: "verwüsten", fa: "ویران کردن"},
            {de: "Beleuchtung", fa: "روشنایی"},
            {de: "überwinden", fa: "غلبه کردن"},
            {de: "beherrschen", fa: "تسلط داشتن"},
            {de: "sentimental", fa: "احساساتی بودن"},
            {de: "umkippen", fa: "واژگون شدن"},
            {de: "Belastungen", fa: "تحمل کردن"},
            {de: "feige", fa: "ترسو بودن"},
            {de: "existieren", fa: "وجود داشتن"},
            {de: "kitzeln", fa: "قلقلک دادن"},
            {de: "träufeln", fa: "چکاندن"},
            {de: "verseuchen", fa: "آلوده کردن"},
            {de: "stottern", fa: "لکنت داشتن"},
            {de: "abtreiben", fa: "سقط کردن"},
            {de: "Sozialexperiment", fa: "آزمایش اجتماعی"},
            {de: "judgen", fa: "قضاوت کردن"},
            {de: "etwas auf die Kette bekommen", fa: "انجام دادن"},
            {de: "kritisieren", fa: "انتقاد کردن"},
            {de: "ausschimpfen", fa: "سرزنش کردن"},
            {de: "Einhorn", fa: "تک‌شاخ بودن"},
            {de: "vermächtnis", fa: "وصیت کردن"},
            {de: "prognose", fa: "پیش‌بینی کردن"},
            {de: "ausdenken", fa: "اختراع کردن"},
            {de: "schimmel", fa: "کپک زدن"},
            {de: "schimmelpilze", fa: "قارچ کپک"},
            {de: "inspirieren", fa: "الهام بخشیدن"},
            {de: "unabhängig", fa: "مستقل بودن"},
            {de: "unabhängigkeit", fa: "استقلال داشتن"},
            {de: "begegnet", fa: "ملاقات کردن"},
            {de: "abfindung", fa: "غرامت گرفتن"},
            {de: "bohren", fa: "سوراخ کردن"},
            {de: "intention", fa: "قصد داشتن"},
            {de: "Tränen", fa: "گریه کردن"},
            {de: "gleichgültig", fa: "بی تفاوت بودن"},
            {de: "elend", fa: "بدبخت بودن"},
            {de: "zögerte", fa: "تردید کردن"},
            {de: "Vergewaltigt", fa: "تجاوز کردن"},
            {de: "Bewältigung", fa: "غلبه کردن"},
            {de: "Pfütze", fa: "آبگیر"}
        ];

        let currentCard = 0;
        let isFlipped = false;

        function updateDisplay() {
            document.getElementById('german').textContent = cards[currentCard].de;
            document.getElementById('persian').textContent = cards[currentCard].fa;
            document.getElementById('counter').textContent = `${currentCard + 1} / ${cards.length}`;
            
            // Reset flip state
            document.getElementById('german').style.display = 'block';
            document.getElementById('persian').style.display = 'none';
            isFlipped = false;
        }

        function flipCard() {
            const german = document.getElementById('german');
            const persian = document.getElementById('persian');
            
            if (isFlipped) {
                german.style.display = 'block';
                persian.style.display = 'none';
            } else {
                german.style.display = 'none';
                persian.style.display = 'block';
            }
            isFlipped = !isFlipped;
        }

        function nextCard() {
            currentCard = (currentCard + 1) % cards.length;
            updateDisplay();
        }

        function prevCard() {
            currentCard = (currentCard - 1 + cards.length) % cards.length;
            updateDisplay();
        }

        // Initial display
        updateDisplay();
    </script>
</body>
</html>
