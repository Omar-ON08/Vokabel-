<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Persisch-Deutsch Lernkarten | Handyoptimiert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c12;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }

        /* Kartenbereich - Handy optimiert */
        .card-wrapper {
            perspective: 1200px;
            margin-bottom: 24px;
            cursor: pointer;
        }

        .flip-card {
            background: transparent;
            width: 100%;
            position: relative;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 28px;
        }

        .flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: relative;
            width: 100%;
            backface-visibility: hidden;
            border-radius: 28px;
            background: linear-gradient(145deg, #131b24 0%, #0e141c 100%);
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(212, 175, 55, 0.2);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .card-front {
            transform: rotateY(0deg);
        }

        .card-back {
            transform: rotateY(180deg);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            justify-content: center;
        }

        /* Verhindert Höhenprobleme */
        .flip-card, .card-front, .card-back {
            min-height: auto;
        }

        .card-back {
            background: linear-gradient(145deg, #0e141c 0%, #0a0f16 100%);
        }

        /* Typografie handygerecht */
        .word-german {
            font-size: clamp(1.8rem, 7vw, 2.4rem);
            font-weight: 800;
            letter-spacing: -0.01em;
            color: #e9b35f;
            border-left: 4px solid #e9b35f;
            padding-left: 16px;
            margin-bottom: 20px;
            word-break: break-word;
            line-height: 1.2;
        }

        .persian-text {
            font-family: 'Noto Sans Arabic', 'Vazir', 'Tahoma', system-ui, sans-serif;
            font-size: clamp(1.5rem, 6vw, 1.9rem);
            font-weight: 500;
            color: #6fcf97;
            direction: rtl;
            line-height: 1.45;
            margin-bottom: 24px;
            text-align: right;
            word-break: break-word;
        }

        .example-sentence {
            background: rgba(233, 179, 95, 0.08);
            padding: 14px 16px;
            border-radius: 20px;
            margin: 14px 0;
            font-style: normal;
            color: #cdd9f4;
            font-size: 0.95rem;
            line-height: 1.45;
            border-left: 3px solid #e9b35f;
            word-break: break-word;
        }

        .grammar-block {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px;
            margin-top: 12px;
            font-size: 0.85rem;
            color: #b9c7d9;
        }

        .grammar-title {
            font-weight: 700;
            color: #e9b35f;
            margin-bottom: 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .conjugation-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px 12px;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .stammformen {
            font-family: 'SF Mono', 'Courier New', monospace;
            background: #00000040;
            padding: 8px 12px;
            border-radius: 16px;
            margin: 10px 0;
            font-size: 0.85rem;
        }

        /* Navigation - Fingerfreundlich */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 8px 0 12px;
        }

        button {
            background: #1e2a36;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 12px 20px;
            min-height: 52px;
            border-radius: 60px;
            color: #f0f3f8;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            flex: 1;
            max-width: 130px;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.96);
            background: #2f3e4e;
        }

        .random-btn {
            background: #2a3a28;
            border: 1px solid #e9b35f80;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin: 12px 8px 8px;
            flex-wrap: wrap;
        }

        .counter {
            background: #0f131bcc;
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #e9b35f;
            font-weight: 500;
        }

        .mode-badge {
            background: #1e1a10;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #d4bc8a;
        }

        .footer-note {
            text-align: center;
            margin-top: 18px;
            font-size: 0.7rem;
            color: #6c7a8e;
        }

        @media (max-width: 480px) {
            .card-front, .card-back {
                padding: 20px 16px;
            }
            .conjugation-grid {
                grid-template-columns: 1fr;
                gap: 6px;
            }
            button {
                padding: 10px 12px;
                font-size: 1rem;
                min-height: 48px;
            }
            .example-sentence {
                font-size: 0.88rem;
            }
        }

        /* Touch-Feedback */
        .card-wrapper:active {
            transform: scale(0.99);
            transition: 0.05s;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="card-wrapper" id="cardWrapper">
        <div class="flip-card" id="flipCard">
            <div class="card-front" id="frontSide">
                <div id="dynamicFront"></div>
            </div>
            <div class="card-back" id="backSide">
                <div id="dynamicBack"></div>
            </div>
        </div>
    </div>

    <div class="nav-buttons">
        <button id="prevBtn" aria-label="Vorige Karte">◀ Vorige</button>
        <button id="nextBtn" aria-label="Nächste Karte">Nächste ▶</button>
        <button id="randomBtn" class="random-btn" aria-label="Zufallskarte (Rechtsklick für Zufallsmodus)">🎲 Zufall</button>
    </div>
    
    <div class="info-panel">
        <div class="counter" id="counterDisplay">Karte 1 / 25</div>
        <div class="mode-badge" id="randomModeBadge">✨ Normal</div>
    </div>
    <div class="footer-note">
        🔄 Tipp auf Karte = umdrehen | 🔽 Langes Drücken auf 🎲 = Zufallsmodus
    </div>
</div>

<script>
    // ======================== KOMPLETTE WORTLISTE ========================
    const cardsData = [
        { word: "erringen", example: "Er hat den ersten Preis errungen.", type: "verb", stemForms: "erringt – errang – errungen", preposition: "keine feste Präposition (Akkusativobjekt)", conjugation: { ich: "erringe", du: "erringst", er: "erringt", wir: "erringen", ihr: "erringt", Sie: "erringen" }, persianTranslation: "به دست آوردن، کسب کردن", persianExample: "او جایزه اول را به دست آورد." },
        { word: "bergab", example: "Der Weg führt bergab.", type: "adverb", persianTranslation: "سرازیری، به سمت پایین کوه", persianExample: "مسیر به سمت سرازیری می‌رود.", specialNote: "Richtungsadverb" },
        { word: "das Abendritual", example: "Lesen ist ihr abendliches Ritual.", type: "noun", article: "das", plural: "die Abendrituale", persianTranslation: "آیین شبانه، مراسم عصرگاهی", persianExample: "مطالعه کردن آیین شبانهٔ اوست." },
        { word: "die Niederlage", example: "Die Mannschaft akzeptierte die Niederlage.", type: "noun", article: "die", plural: "die Niederlagen", persianTranslation: "شکست", persianExample: "تیم شکست را پذیرفت." },
        { word: "einsickern", example: "Das Wasser sickert in den Boden ein.", type: "verb", stemForms: "sickert ein – sickerte ein – eingesickert", preposition: "IN + Akkusativ (in den Boden)", conjugation: { ich: "sickere ein", du: "sickerst ein", er: "sickert ein", wir: "sickern ein", ihr: "sickert ein", Sie: "sickern ein" }, persianTranslation: "نفوذ کردن، تراوش کردن", persianExample: "آب به درون خاک نفوذ می‌کند." },
        { word: "der Weg / die Bahn", example: "Auf dem Weg zur Arbeit. Die Bahn nehmen.", type: "noun", article: "der / die", plural: "die Wege / die Bahnen", persianTranslation: "راه / مسیر – خط/راه‌آهن", persianExample: "در راه به سر کار. سوار شدن به قطار." },
        { word: "vorschmecken", example: "Die Soße lässt den Feinschmecker das Hauptgericht vorschmecken.", type: "verb", stemForms: "schmeckt vor – schmeckte vor – vorgeschmeckt", preposition: "DATIV (jemandem) + AKK", conjugation: { ich: "schmecke vor", du: "schmeckst vor", er: "schmeckt vor", wir: "schmecken vor", ihr: "schmeckt vor", Sie: "schmecken vor" }, persianTranslation: "پیش‌چشیدن، طعم چیزی را پیشاپیش حس کردن", persianExample: "سس طعم غذای اصلی را پیش‌چش می‌دهد." },
        { word: "schüren", example: "Er schürt das Feuer / die Angst.", type: "verb", stemForms: "schürt – schürte – geschürt", preposition: "keine fixe, oft Akkusativ", conjugation: { ich: "schüre", du: "schürst", er: "schürt", wir: "schüren", ihr: "schürt", Sie: "schüren" }, persianTranslation: "افروختن، شعله‌ور کردن", persianExample: "او آتش را شعله‌ور می‌کند." },
        { word: "abwimmeln", example: "Sie hat den lästigen Verkäufer abgewimmelt.", type: "verb", stemForms: "wimmelt ab – wimmelte ab – abgewimmelt", preposition: "Akkusativ (jemanden abwimmeln)", conjugation: { ich: "wimmle ab", du: "wimmelst ab", er: "wimmelt ab", wir: "wimmeln ab", ihr: "wimmelt ab", Sie: "wimmeln ab" }, persianTranslation: "سر باز زدن، طفره رفتن", persianExample: "او فروشندهٔ مزاحم را رد کرد." },
        { word: "die Akte", example: "Die Akte liegt auf dem Tisch.", type: "noun", article: "die", plural: "die Akten", persianTranslation: "پرونده", persianExample: "پرونده روی میز است." },
        { word: "stolpern", example: "Er stolpert über einen Stein.", type: "verb", stemForms: "stolpert – stolperte – gestolpert", preposition: "ÜBER (Akkusativ)", conjugation: { ich: "stolpere", du: "stolperst", er: "stolpert", wir: "stolpern", ihr: "stolpert", Sie: "stolpern" }, persianTranslation: "لغزیدن، زمین خوردن", persianExample: "او بر روی سنگی می‌لغزد." },
        { word: "anstoßen", example: "Wir stoßen mit Sekt an.", type: "verb", stemForms: "stößt an – stieß an – angestoßen", preposition: "MIT (Dativ)", conjugation: { ich: "stoße an", du: "stößt an", er: "stößt an", wir: "stoßen an", ihr: "stoßt an", Sie: "stoßen an" }, persianTranslation: "جام زدن، نوشیدن به سلامتی", persianExample: "ما با شامپاین جام می‌زنیم." },
        { word: "kratzen / die Kratze", example: "Die Katze kratzt an der Tür. / Die Kratze am Lack.", type: "verb_noun", verbForms: "kratzt – kratzte – gekratzt", nounArticle: "die", plural: "die Kratzen", conjugation: { ich: "kratze", du: "kratzt", er: "kratzt", wir: "kratzen", ihr: "kratzt", Sie: "kratzen" }, persianTranslation: "خراشیدن / خراش", persianExample: "گربه در را خراش می‌دهد. / خراش روی رنگ." },
        { word: "einreden", example: "Er redet ihr ein, dass sie krank sei.", type: "verb", stemForms: "redet ein – redete ein – eingeredet", preposition: "DATIV (jemandem) + AKK", conjugation: { ich: "rede ein", du: "redest ein", er: "redet ein", wir: "reden ein", ihr: "redet ein", Sie: "reden ein" }, persianTranslation: "تلقین کردن", persianExample: "او به او تلقین می‌کند که بیمار است." },
        { word: "der Spitzenreiter", example: "Das Team ist Spitzenreiter der Tabelle.", type: "noun", article: "der", plural: "die Spitzenreiter", persianTranslation: "پیشتاز، صدرنشین", persianExample: "تیم صدرنشین جدول است." },
        { word: "erwägen", example: "Ich erwäge einen Jobwechsel.", type: "verb", stemForms: "erwägt – erwog – erwogen", preposition: "Akkusativ", conjugation: { ich: "erwäge", du: "erwägst", er: "erwägt", wir: "erwägen", ihr: "erwägt", Sie: "erwägen" }, persianTranslation: "سنجیدن، در نظر گرفتن", persianExample: "من تغییر شغل را در نظر دارم." },
        { word: "der / die Heranwachsende", example: "Heranwachsende brauchen besondere Unterstützung.", type: "noun", article: "der/die", plural: "die Heranwachsenden", persianTranslation: "نوجوان، جوان در حال رشد", persianExample: "نوجوانان به حمایت ویژه نیاز دارند." },
        { word: "die Anstiftung", example: "Anstiftung zur Straftat ist verboten.", type: "noun", article: "die", plural: "die Anstiftungen", persianTranslation: "تحریک، ترغیب", persianExample: "تحریک به جرم ممنوع است." },
        { word: "erzeugen", example: "Windkraft erzeugt saubere Energie.", type: "verb", stemForms: "erzeugt – erzeugte – erzeugt", preposition: "Akkusativ", conjugation: { ich: "erzeuge", du: "erzeugst", er: "erzeugt", wir: "erzeugen", ihr: "erzeugt", Sie: "erzeugen" }, persianTranslation: "تولید کردن، ایجاد کردن", persianExample: "انرژی بادی انرژی پاک تولید می‌کند." },
        { word: "der Verstoß", example: "Ein Verstoß gegen die Regeln.", type: "noun", article: "der", plural: "die Verstöße", persianTranslation: "تخلف، نقض", persianExample: "تخلف از قوانین." },
        { word: "beschließen", example: "Der Verein beschließt neue Statuten.", type: "verb", stemForms: "beschließt – beschloss – beschlossen", preposition: "Akkusativ", conjugation: { ich: "beschließe", du: "beschließt", er: "beschließt", wir: "beschließen", ihr: "beschließt", Sie: "beschließen" }, persianTranslation: "تصمیم گرفتن، تصویب کردن", persianExample: "باشگاه اساسنامهٔ جدید تصویب می‌کند." },
        { word: "positionieren", example: "Sie positioniert die Figuren auf dem Schachbrett.", type: "verb", stemForms: "positioniert – positionierte – positioniert", preposition: "AUF + Dativ / AKK", conjugation: { ich: "positioniere", du: "positionierst", er: "positioniert", wir: "positionieren", ihr: "positioniert", Sie: "positionieren" }, persianTranslation: "موقعیت‌دهی، قرار دادن", persianExample: "او مهره‌ها را روی صفحهٔ شطرنج قرار می‌دهد." },
        { word: "die Auffassung", example: "Meiner Auffassung nach ist das korrekt.", type: "noun", article: "die", plural: "die Auffassungen", persianTranslation: "نظر، برداشت", persianExample: "به نظر من این درست است." },
        { word: "konfirmieren", example: "Er konfirmiert den Empfang der E-Mail.", type: "verb", stemForms: "konfirmiert – konfirmierte – konfirmiert", preposition: "Akkusativ", conjugation: { ich: "konfirmiere", du: "konfirmierst", er: "konfirmiert", wir: "konfirmieren", ihr: "konfirmiert", Sie: "konfirmieren" }, persianTranslation: "تأیید کردن، تصدیق کردن", persianExample: "او دریافت ایمیل را تأیید می‌کند." }
    ];

    let currentIndex = 0;
    let randomMode = false;
    const flipCard = document.getElementById("flipCard");
    const frontDiv = document.getElementById("dynamicFront");
    const backDiv = document.getElementById("dynamicBack");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const randomBtn = document.getElementById("randomBtn");
    const counterSpan = document.getElementById("counterDisplay");
    const modeSpan = document.getElementById("randomModeBadge");

    function buildFront(card) {
        let html = `<div class="word-german">${card.word}</div>`;
        if (card.example) html += `<div class="example-sentence">📖 ${card.example}</div>`;
        html += `<div class="grammar-block">`;
        if (card.type === "verb") {
            html += `<div class="grammar-title">⚡ STAMMFORMEN</div><div class="stammformen">${card.stemForms}</div>`;
            if (card.preposition) html += `<div class="grammar-title">📌 PRÄPOSITION</div><div>${card.preposition}</div>`;
            html += `<div class="grammar-title">📖 PRÄSENS</div><div class="conjugation-grid">`;
            const c = card.conjugation;
            if (c) html += `<span>ich: ${c.ich}</span><span>du: ${c.du}</span><span>er/sie: ${c.er}</span><span>wir: ${c.wir}</span><span>ihr: ${c.ihr}</span><span>Sie: ${c.Sie}</span>`;
            html += `</div>`;
        } else if (card.type === "noun") {
            html += `<div class="grammar-title">📌 ARTIKEL & PLURAL</div><div>${card.article} | Plural: ${card.plural}</div>`;
        } else if (card.type === "verb_noun") {
            html += `<div class="grammar-title">🔨 VERB (kratzen)</div><div>${card.verbForms}</div><div class="conjugation-grid">${Object.entries(card.conjugation).map(([p,f]) => `${p}: ${f}`).join(" · ")}</div>`;
            html += `<div class="grammar-title">📦 NOMEN (die Kratze)</div><div>Plural: ${card.plural}</div>`;
        } else if (card.specialNote) {
            html += `<div class="grammar-title">ℹ️ INFO</div><div>${card.specialNote}</div>`;
        }
        html += `</div>`;
        return html;
    }

    function buildBack(card) {
        return `<div class="persian-text">🇮🇷 ${card.persianTranslation}</div>
                <div class="example-sentence" style="background:#1e2a1e;">📖 فارسی:<br>${card.persianExample}</div>`;
    }

    function updateUI() {
        const card = cardsData[currentIndex];
        if (!card) return;
        frontDiv.innerHTML = buildFront(card);
        backDiv.innerHTML = buildBack(card);
        counterSpan.innerText = `Karte ${currentIndex+1} / ${cardsData.length}`;
        if (flipCard.classList.contains("flipped")) flipCard.classList.remove("flipped");
    }

    function next() {
        if (randomMode) currentIndex = Math.floor(Math.random() * cardsData.length);
        else currentIndex = (currentIndex + 1) % cardsData.length;
        updateUI();
    }
    function prev() {
        if (randomMode) currentIndex = Math.floor(Math.random() * cardsData.length);
        else currentIndex = (currentIndex - 1 + cardsData.length) % cardsData.length;
        updateUI();
    }
    function randomCard() {
        currentIndex = Math.floor(Math.random() * cardsData.length);
        updateUI();
    }
    function toggleRandomMode(e) {
        e.preventDefault();
        randomMode = !randomMode;
        modeSpan.innerText = randomMode ? "🎲 ZUFALLS-MODUS" : "✨ Normalmodus";
        modeSpan.style.background = randomMode ? "#5e4a2a" : "#1e1a10";
        if (randomMode) randomCard();
    }

    document.getElementById("cardWrapper").addEventListener("click", () => flipCard.classList.toggle("flipped"));
    prevBtn.addEventListener("click", prev);
    nextBtn.addEventListener("click", next);
    randomBtn.addEventListener("click", randomCard);
    randomBtn.addEventListener("contextmenu", toggleRandomMode);
    // Touch long-press Schutz (optional)
    randomBtn.addEventListener("touchstart", (e) => { if (e.touches.length === 1) { let timer = setTimeout(() => { e.preventDefault(); toggleRandomMode(e); }, 500); e.target.addEventListener("touchend", () => clearTimeout(timer), { once: true }); } });
    
    updateUI();
</script>
</body>
</html>
