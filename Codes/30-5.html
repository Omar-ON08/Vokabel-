 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Persisch-Deutsch Lernkarten</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Verhindert ungewolltes Markieren auf Karten */
        }

        body {
            background: #0a0f0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Hauptcontainer */
        .app-container {
            max-width: 700px;
            width: 100%;
            background: #0f1215;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        /* Kartencontainer */
        .card-container {
            perspective: 1500px;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .card {
            background: transparent;
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 2;
            transition: transform 0.6s ease-in-out;
            transform-style: preserve-3d;
            border-radius: 28px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 28px;
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* Vorderseite (Deutsch) */
        .card-front {
            background: linear-gradient(145deg, #1e1e2a 0%, #14141c 100%);
            border: 1px solid #ffd966;
            color: #f0f0f0;
            transform: rotateY(0deg);
        }

        /* Rückseite (Persisch) */
        .card-back {
            background: linear-gradient(145deg, #0e2a1f 0%, #0a1f15 100%);
            border: 1px solid #2ecc71;
            color: #e8f5e9;
            transform: rotateY(180deg);
            font-family: 'Vazir', 'Segoe UI', Tahoma, sans-serif;
            direction: rtl;
            text-align: right;
        }

        /* Typografie Vorderseite */
        .word-german {
            font-size: 2rem;
            font-weight: 800;
            color: #ffd966;
            margin-bottom: 1rem;
            border-bottom: 2px solid #ffd966;
            display: inline-block;
            padding-bottom: 5px;
        }

        .example-sentence {
            background: rgba(255,217,102,0.1);
            padding: 12px;
            border-radius: 18px;
            margin: 12px 0;
            font-style: italic;
            border-left: 4px solid #ffd966;
            font-size: 0.95rem;
        }

        .grammar-section {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .grammar-title {
            font-weight: bold;
            color: #ffd966;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .conjugation-table {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 12px;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Persisch Rückseite */
        .persian-word {
            font-size: 2rem;
            font-weight: bold;
            color: #7ee081;
            margin-bottom: 1rem;
            text-align: right;
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 6px;
        }

        .persian-example {
            background: rgba(46,204,113,0.15);
            padding: 12px;
            border-radius: 18px;
            margin-top: 15px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .label-persian {
            font-size: 0.7rem;
            color: #b9f6ca;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 20px 0 15px;
            flex-wrap: wrap;
        }

        button {
            background: #1e1e2a;
            border: 1px solid #ffd966;
            color: #ffd966;
            padding: 10px 22px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }

        button:active {
            transform: scale(0.96);
        }

        button:hover {
            background: #ffd966;
            color: #0a0f0f;
            border-color: #ffd966;
        }

        .random-btn {
            background: #2c2c3a;
            border-color: #ffaa33;
        }

        /* Counter */
        .counter {
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .info-preposition {
            background: #ffd96620;
            border-radius: 20px;
            padding: 4px 10px;
            display: inline-block;
            font-size: 0.7rem;
            margin-bottom: 8px;
            color: #ffcc77;
        }

        @media (max-width: 550px) {
            .card-front, .card-back { padding: 1rem; }
            .word-german { font-size: 1.5rem; }
            .persian-word { font-size: 1.5rem; }
            button { padding: 6px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="card-container" id="cardContainer">
        <div class="card" id="flashcard">

            <div class="card-back" id="cardBack"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <button id="prevBtn">◀ Vorige</button>
        <button id="randomBtn" class="random-btn">🎲 Zufall</button>
        <button id="nextBtn">Nächste ▶</button>
    </div>
    <div class="counter" id="counter">Karte 1 / 30</div>
</div>

            persianExample: "این شگفت‌انگیز است."

    ];

    // ----- Helper: HTML für Vorderseite bauen (DEUTSCH) ----
    function buildFront(card, idx) {
        let html = `<div class="word-german">${card.german}</div>`;
        // Präposition falls Verb
        if(card.type === "verb" && card.praep && card.praep !== "") {
            html += `<div class="info-preposition">📌 Präposition: ${card.praep}</div>`;
        }
        html += `<div class="example-sentence">📖 ${card.example}</div>`;
        html += `<div class="grammar-section">`;
        if(card.type === "verb") {
            html += `<div class="grammar-title">⚡ Stammformen</div><div>${card.stems}</div>`;
            html += `<div class="grammar-title" style="margin-top:10px">📚 Präsens Konjugation</div>`;
            html += `<div class="conjugation-table">${card.conjugation.replace(/, /g, '<br>')}</div>`;
        } else if(card.type === "noun") {
            html += `<div class="grammar-title">📌 Artikel & Plural</div>`;
            html += `<div>${card.article} ${card.german} · Plural: ${card.plural}</div>`;
            if(card.forms && card.forms !== "") html += `<div>${card.forms}</div>`;
        } else if(card.type === "adj") {
            html += `<div class="grammar-title">📈 Steigerung</div><div>${card.forms}</div>`;
        } else if(card.type === "adv" || card.type === "idiom") {
            html += `<div class="grammar-title">🔹 Info</div><div>${card.forms}</div>`;
        } else {
            html += `<div class="grammar-title">ℹ️ Formen</div><div>${card.forms || "—"}</div>`;
        }
        html += `</div>`;
        return html;
    }

    // Rückseite (Persisch)
    function buildBack(card) {
        return `
            <div class="persian-word">${card.persian}</div>
            <div class="persian-example">
                <div class="label-persian">📖 مثال (Beispiel)</div>
                ${card.persianExample}
            </div>
        `;
    }

    let currentIndex = 0;
    let randomMode = false;
    const cardElement = document.getElementById("flashcard");
    const frontDiv = document.getElementById("cardFront");
    const backDiv = document.getElementById("cardBack");
    const counterSpan = document.getElementById("counter");

    function updateCard() {
        const card = cardsData[currentIndex];
        frontDiv.innerHTML = buildFront(card, currentIndex);
        backDiv.innerHTML = buildBack(card);
        cardElement.classList.remove("flipped");
        counterSpan.innerText = `Karte ${currentIndex+1} / ${cardsData.length} ${randomMode ? "(🔀 Zufallsmodus)" : ""}`;
    }

    function nextCard() {
        if(randomMode) {
            let newIndex;
            do { newIndex = Math.floor(Math.random() * cardsData.length); } 
            while(newIndex === currentIndex && cardsData.length > 1);
            currentIndex = newIndex;
        } else {
            currentIndex = (currentIndex + 1) % cardsData.length;
        }
        updateCard();
    }

    function prevCard() {
        if(randomMode) {
            let newIndex;
            do { newIndex = Math.floor(Math.random() * cardsData.length); }
            while(newIndex === currentIndex && cardsData.length > 1);
            currentIndex = newIndex;
        } else {
            currentIndex = (currentIndex - 1 + cardsData.length) % cardsData.length;
        }
        updateCard();
    }

    function randomCard() {
        let newIndex;
        do { newIndex = Math.floor(Math.random() * cardsData.length); } 
        while(newIndex === currentIndex && cardsData.length > 1);
        currentIndex = newIndex;
        updateCard();
    }

    // Flip beim Klick auf Container
    document.getElementById("cardContainer").addEventListener("click", (e) => {
        if(e.target.closest('button')) return;
        cardElement.classList.toggle("flipped");
    });

    // Zufallsmodus per Rechtsklick auf Zufall-Button
    const randomBtn = document.getElementById("randomBtn");
    randomBtn.addEventListener("click", (e) => {
        if(e.button === 2) { // Rechtsklick
            e.preventDefault();
            randomMode = !randomMode;
            randomBtn.style.background = randomMode ? "#ffaa33" : "#2c2c3a";
            randomBtn.style.color = randomMode ? "#0a0f0f" : "#ffd966";
            counterSpan.innerText = `Karte ${currentIndex+1} / ${cardsData.length} ${randomMode ? "(🔀 Zufallsmodus)" : ""}`;
        } else {
            randomCard();
        }
    });
    // Kontextmenu auf Button unterdrücken
    randomBtn.addEventListener("contextmenu", (e) => e.preventDefault());

    document.getElementById("nextBtn").addEventListener("click", nextCard);
    document.getElementById("prevBtn").addEventListener("click", prevCard);

    // Initiale Karte
    updateCard();
</script>
</body>
</html>
