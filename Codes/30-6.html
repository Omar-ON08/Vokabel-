 <!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Persisch-Deutsch Lernkarten | Verben · Nomen · Adjektive · Redewendungen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* verhindert ungewolltes Markieren auf Karten */
    }

    body {
      background: #0a0c12;
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* Hauptcontainer */
    .app-container {
      max-width: 650px;
      width: 100%;
      margin: 0 auto;
    }

    /* Kartenwrapper 3D Effekt */
    .card-scene {
      perspective: 1500px;
      margin-bottom: 2rem;
    }

    .card {
      background: transparent;
      width: 100%;
      height: auto;
      min-height: 460px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .card-inner {
      position: relative;
      width: 100%;
      min-height: 460px;
      text-align: center;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    /* Vorder- und Rückseite */
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      min-height: 460px;
      backface-visibility: hidden;
      border-radius: 32px;
      padding: 1.8rem 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      text-align: left;
      box-sizing: border-box;
    }

    .card-front {
      background: linear-gradient(145deg, #141a24 0%, #0e121c 100%);
      border: 1px solid rgba(212, 175, 55, 0.3);
      transform: rotateY(0deg);
    }

    .card-back {
      background: linear-gradient(145deg, #0f1722 0%, #0a0e16 100%);
      border: 1px solid rgba(212, 175, 55, 0.4);
      transform: rotateY(180deg);
      direction: rtl; /* Persische Schrift rechtsbündig */
    }

    /* Typografie – Deutsch */
    .card-front h2 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #e6b422;
      letter-spacing: -0.3px;
      border-left: 4px solid #e6b422;
      padding-left: 0.9rem;
      margin-bottom: 1rem;
      word-break: break-word;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b9aa7a;
      margin-top: 0.75rem;
      margin-bottom: 0.25rem;
      font-weight: 500;
    }

    .example-sentence {
      background: rgba(230, 180, 34, 0.08);
      padding: 0.7rem 1rem;
      border-radius: 20px;
      color: #ddd9ce;
      font-style: italic;
      margin: 0.5rem 0 0.8rem 0;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .forms-grid, .conjugation-grid {
      font-size: 0.85rem;
      background: rgba(0, 0, 0, 0.35);
      padding: 0.6rem 0.8rem;
      border-radius: 20px;
      margin-top: 0.6rem;
      color: #cfcfcf;
    }

    .conjugation-grid span, .forms-grid span {
      display: inline-block;
      font-weight: 500;
      color: #e6b422;
      min-width: 55px;
    }

    .badge {
      display: inline-block;
      background: #e6b42220;
      color: #e6b422;
      border-radius: 40px;
      font-size: 0.7rem;
      padding: 0.2rem 0.7rem;
      margin-bottom: 0.8rem;
      border: 0.5px solid #e6b42260;
    }

    /* Persische Rückseite */
    .card-back .persian-word {
      font-size: 2rem;
      font-weight: 700;
      color: #6fcf97;
      text-align: right;
      margin-bottom: 0.75rem;
      line-height: 1.3;
      word-break: break-word;
    }

    .persian-example {
      font-size: 1rem;
      color: #cbd5e1;
      background: #1a241eb0;
      padding: 0.7rem;
      border-radius: 20px;
      margin-top: 0.5rem;
      text-align: right;
      direction: rtl;
      line-height: 1.6;
    }

    .small-note {
      font-size: 0.7rem;
      color: #b9aa7a;
      margin-top: 1rem;
      text-align: right;
    }

    /* Navigation */
    .nav-bar {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    button {
      background: #1e2533;
      border: none;
      color: #e6b422;
      font-weight: 600;
      padding: 0.8rem 1.6rem;
      border-radius: 60px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      border: 1px solid #e6b42240;
    }

    button:active {
      transform: scale(0.96);
    }

    button:hover {
      background: #2a3343;
      border-color: #e6b422;
    }

    .counter {
      text-align: center;
      color: #b9aa7a;
      font-size: 0.85rem;
      margin-top: 1rem;
      font-weight: 500;
    }

    /* Rechtsklick-Hinweis */
    .random-context {
      position: relative;
    }
    .random-context small {
      display: block;
      font-size: 0.65rem;
      color: #b9aa7a80;
      text-align: center;
      margin-top: 0.4rem;
    }

    @media (max-width: 550px) {
      .card-front, .card-back {
        padding: 1.2rem;
      }
      .card-front h2 {
        font-size: 1.5rem;
      }
      button {
        padding: 0.6rem 1.2rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="card-scene">
    <div class="card" id="flashcard">
      <div class="card-inner">
        <!-- Vorderseite DEUTSCH -->
        <div class="card-front" id="frontSide">
          <!-- dynamisch befüllt -->
        </div>
        <!-- Rückseite PERSISCH -->
        <div class="card-back" id="backSide">
          <!-- dynamisch befüllt -->
        </div>
      </div>
    </div>
  </div>

  <div class="nav-bar">
    <button id="prevBtn">◀ Vorige</button>
    <button id="nextBtn">Nächste ▶</button>
    <button id="randomBtn" class="random-context">🎲 Zufall</button>
  </div>
  <div class="counter" id="counterText">Karte 1 / X</div>
</div>

<script>
  // ----------------------------------------------
  // DATENBANK – alle Wörter nach Vorgabe
  // Bei Verben: 3 Stammformen + Konjugation (Präsens) + Präposition (falls vorhanden)
  // Bei Nomen: Artikel + Plural
  // Adjektive: Steigerungsformen
  // Redewendungen: Idiom-Kennzeichnung + Erklärung
  // ----------------------------------------------
  const cardsData = [
    { type: "Redewendung", word: "Redewendung", example: "Das ist eine typische deutsche Redewendung.", details: { idiom: true, meaning: "feste Wortverbindung, übertragene Bedeutung", persian: "اصطلاح", persianExample: "این یک اصطلاح آلمانی است." } },
    { type: "Nomen", word: "Geborgenheit", example: "In ihrer Familie fand sie Geborgenheit.", details: { article: "die", plural: "– (Singularetantum)", persian: "آرامش, امنیت عاطفی", persianExample: "او در خانواده‌اش آرامش پیدا کرد." } },
    { type: "Verb", word: "sträubst", example: "Du sträubst dich gegen jede Änderung.", details: { infinitive: "sträuben", stemForms: "sträubt – sträubte – gesträubt", conjugation: { ich: "sträube", du: "sträubst", er: "sträubt", wir: "sträuben", ihr: "sträubt", sie: "sträuben" }, preposition: "sich sträuben GEGEN", persian: "مقاومت کردن", persianExample: "تو در برابر هر تغییری مقاومت می‌کنی." } },
    { type: "Verb", word: "abstempeln", example: "Man hat ihn schnell als Lügner abgestempelt.", details: { infinitive: "abstempeln", stemForms: "stempelt ab – stempelte ab – abgestempelt", conjugation: { ich: "stempele ab", du: "stempelst ab", er: "stempelt ab", wir: "stempeln ab", ihr: "stempelt ab", sie: "stempeln ab" }, preposition: "jmdn. als etw. abstempeln", persian: "برچسب زدن (به کسی)", persianExample: "او را سریعاً به عنوان دروغگو برچسب زدند." } },
    { type: "Verb", word: "angepriesen", example: "Das Produkt wurde als Wundermittel angepriesen.", details: { infinitive: "anpreisen", stemForms: "preist an – pries an – angepriesen", conjugation: { ich: "preise an", du: "preist an", er: "preist an", wir: "preisen an", ihr: "preist an", sie: "preisen an" }, preposition: "anpreisen ALS", persian: "تبلیغ کردن, تعریف اغراق‌آمیز", persianExample: "این محصول به عنوان داروی معجزه‌آسا تبلیغ شد." } },
    { type: "Adjektiv", word: "schrumpelig", example: "Die alte Frau hatte schrumpelige Hände.", details: { comparative: "schrumpeliger", superlative: "am schrumpeligsten", persian: "چروکیده", persianExample: "زن پیر دست‌های چروکیده‌ای داشت." } },
    { type: "Nomen", word: "Konsistenz", example: "Die Konsistenz der Soße war perfekt.", details: { article: "die", plural: "Konsistenzen", persian: "قوام, یکنواختی", persianExample: "قوام سس عالی بود." } },
    { type: "Nomen", word: "Orientierung", example: "Er verlor die Orientierung im Wald.", details: { article: "die", plural: "Orientierungen", persian: "جهت‌یابی, راهنمایی", persianExample: "او در جنگل جهت‌یابی را از دست داد." } },
    { type: "Verb", word: "juckt", example: "Mein Rücken juckt furchtbar.", details: { infinitive: "jucken", stemForms: "juckt – juckte – gejuckt", conjugation: { ich: "jucke", du: "juckst", er: "juckt", wir: "jucken", ihr: "juckt", sie: "jucken" }, preposition: "juckt AN/ AUF (keine feste Präp)", persian: "خارش داشتن", persianExample: "کمرم به شدت می‌خارد." } },
    { type: "Verb", word: "gejagt", example: "Der Hund hat die Katze gejagt.", details: { infinitive: "jagen", stemForms: "jagt – jagte – gejagt", conjugation: { ich: "jage", du: "jagst", er: "jagt", wir: "jagen", ihr: "jagt", sie: "jagen" }, preposition: "jagen NACH", persian: "شکار کردن, دنبال کردن", persianExample: "سگ گربه را شکار کرد." } },
    { type: "Adjektiv", word: "neidig", example: "Sie ist neidig auf ihren Erfolg.", details: { comparative: "neidiger", superlative: "am neidigsten", persian: "حسود", persianExample: "او به موفقیتش حسود است." } },
    { type: "Nomen", word: "Indoktrination", example: "Die Indoktrination begann schon in der Schule.", details: { article: "die", plural: "Indoktrinationen", persian: "تلقین فکری, شستشوی مغزی", persianExample: "تلقین فکری از مدرسه شروع شد." } },
    { type: "Verb", word: "segne", example: "Der Priester segnet die Gemeinde.", details: { infinitive: "segnen", stemForms: "segnet – segnete – gesegnet", conjugation: { ich: "segne", du: "segnest", er: "segnet", wir: "segnen", ihr: "segnet", sie: "segnen" }, preposition: "segnen MIT", persian: "برکت دادن", persianExample: "کشیش به جماعت برکت می‌دهد." } },
    { type: "Verb", word: "trödeln", example: "Trödeln Sie nicht, wir haben wenig Zeit.", details: { infinitive: "trödeln", stemForms: "trödelt – trödelte – getrödelt", conjugation: { ich: "trödele", du: "trödelst", er: "trödelt", wir: "trödeln", ihr: "trödelt", sie: "trödeln" }, preposition: "trödeln (keine feste Präp)", persian: "وقت تلف کردن, کُندی کردن", persianExample: "وقت تلف نکنید، زمان کمی داریم." } },
    { type: "Adjektiv", word: "langfristig", example: "Eine langfristige Investition lohnt sich.", details: { comparative: "langfristiger", superlative: "am langfristigsten", persian: "بلندمدت", persianExample: "سرمایه‌گذاری بلندمدت ارزش دارد." } },
    { type: "Nomen", word: "Kriterium", example: "Das ist ein wichtiges Kriterium.", details: { article: "das", plural: "Kriterien", persian: "معیار", persianExample: "این یک معیار مهم است." } },
    { type: "Nomen", word: "Ausschluss", example: "Unter Ausschluss der Öffentlichkeit.", details: { article: "der", plural: "Ausschlüsse", persian: "رد, محرومیت", persianExample: "بدون حضور عموم (محرومیت از حضور)." } },
    { type: "Nomen", word: "Ausschlusskriterium", example: "Fehlende Bewerbung ist ein Ausschlusskriterium.", details: { article: "das", plural: "Ausschlusskriterien", persian: "معیار حذف", persianExample: "نداشتن درخواست یک معیار حذف است." } },
    { type: "Nomen", word: "Spirale", example: "Die Abwärtsspirale setzte ein.", details: { article: "die", plural: "Spiralen", persian: "مارپیچ", persianExample: "مارپیچ نزولی آغاز شد." } },
    { type: "Verb", word: "VERHÜten", example: "Man muss Unfälle verhüten.", details: { infinitive: "verhüten", stemForms: "verhütet – verhütete – verhütet", conjugation: { ich: "verhüte", du: "verhütest", er: "verhütet", wir: "verhüten", ihr: "verhütet", sie: "verhüten" }, preposition: "verhüten (vor etwas)", persian: "پیشگیری کردن", persianExample: "باید از حوادث پیشگیری کرد." } },
    { type: "Nomen", word: "Zeitwende", example: "Die digitale Zeitwende ist da.", details: { article: "die", plural: "Zeitwenden", persian: "دگرگونی عصر, تحول زمانه", persianExample: "دگرگونی عصر دیجیتال فرا رسیده است." } },
    { type: "Nomen", word: "Modebegriff", example: "Nachhaltigkeit ist ein Modebegriff geworden.", details: { article: "der", plural: "Modebegriffe", persian: "اصطلاح رایج/ مد روز", persianExample: "پایداری به یک اصطلاح مد روز تبدیل شده است." } },
    { type: "Verb", word: "vertrieben", example: "Der Sturm vertrieb die Wolken.", details: { infinitive: "vertreiben", stemForms: "vertreibt – vertrieb – vertrieben", conjugation: { ich: "vertreibe", du: "vertreibst", er: "vertreibt", wir: "vertreiben", ihr: "vertreibt", sie: "vertreiben" }, preposition: "vertreiben AUS", persian: "رانده شدن, پراکندن", persianExample: "طوفان ابرها را پراکند." } },
    { type: "Adjektiv", word: "ehemaliges", example: "Das ist mein ehemaliges Haus.", details: { comparative: "–", superlative: "–", persian: "سابق, پیشین", persianExample: "این خانه سابق من است." } },
    { type: "Nomen", word: "Auseinandersetzungen", example: "Politische Auseinandersetzungen sind normal.", details: { article: "die", plural: "(Pluralform gleich)", persian: "منازعات, بحث‌ها", persianExample: "منازعات سیاسی طبیعی است." } },
    { type: "Nomen", word: "Abzeichen", example: "Er trug ein Abzeichen auf der Uniform.", details: { article: "das", plural: "Abzeichen", persian: "نشان, سینه‌ریز", persianExample: "او یک نشان بر روی یونیفرمش داشت." } },
    { type: "Verb", word: "vorgehen muss", example: "Man muss systematisch vorgehen.", details: { infinitive: "vorgehen", stemForms: "geht vor – ging vor – vorgegangen", conjugation: { ich: "gehe vor", du: "gehst vor", er: "geht vor", wir: "gehen vor", ihr: "geht vor", sie: "gehen vor" }, preposition: "vorgehen GEGEN", persian: "اقدام کردن, عمل کردن", persianExample: "باید سیستماتیک عمل کرد." } },
    { type: "Verb", word: "leugnen", example: "Er leugnete die Tat.", details: { infinitive: "leugnen", stemForms: "leugnet – leugnete – geleugnet", conjugation: { ich: "leugne", du: "leugnest", er: "leugnet", wir: "leugnen", ihr: "leugnet", sie: "leugnen" }, preposition: "leugnen (etw. leugnen)", persian: "انکار کردن", persianExample: "او عمل را انکار کرد." } },
    { type: "Nomen", word: "Optimalfall", example: "Im Optimalfall läuft alles glatt.", details: { article: "der", plural: "Optimalfälle", persian: "وضعیت بهینه", persianExample: "در وضعیت بهینه، همه چیز روان پیش می‌رود." } },
    { type: "Verb", word: "erringen", example: "Sie errang den Sieg.", details: { infinitive: "erringen", stemForms: "erringt – errang – errungen", conjugation: { ich: "erringe", du: "erringst", er: "erringt", wir: "erringen", ihr: "erringt", sie: "erringen" }, preposition: "erringen (etw. erringen)", persian: "به دست آوردن, کسب کردن", persianExample: "او پیروزی را به دست آورد." } }
  ];

  // --------------------- UI LOGIC -------------------------
  let currentIndex = 0;
  let randomMode = false;     // wenn true -> nächste Karte zufällig
  let cardElement = document.getElementById('flashcard');
  let frontDiv = document.getElementById('frontSide');
  let backDiv = document.getElementById('backSide');
  let counterSpan = document.getElementById('counterText');

  // Hilfsfunktion: HTML für Vorderseite (DEUTSCH) generieren
  function renderFront(card) {
    let html = `<h2>${card.word}</h2>`;
    html += `<div class="section-label">📖 BEISPIEL</div><div class="example-sentence">${card.example}</div>`;
    
    if (card.type === "Verb") {
      const d = card.details;
      html += `<div class="section-label">⚡ STAMMFORMEN</div><div class="forms-grid">${d.stemForms}</div>`;
      if (d.preposition) html += `<div class="section-label">🔗 PRÄPOSITION</div><div class="forms-grid">${d.preposition}</div>`;
      html += `<div class="section-label">📌 PRÄSENS KONJUGATION</div><div class="conjugation-grid">
        <span>ich</span> ${d.conjugation.ich}<br>
        <span>du</span> ${d.conjugation.du}<br>
        <span>er/sie/es</span> ${d.conjugation.er}<br>
        <span>wir</span> ${d.conjugation.wir}<br>
        <span>ihr</span> ${d.conjugation.ihr}<br>
        <span>Sie/sie</span> ${d.conjugation.sie}
      </div>`;
    }
    else if (card.type === "Nomen") {
      const d = card.details;
      html += `<div class="section-label">📚 ARTIKEL & PLURAL</div><div class="forms-grid">${d.article} · Plural: ${d.plural}</div>`;
    }
    else if (card.type === "Adjektiv") {
      const d = card.details;
      html += `<div class="section-label">📈 STEIGERUNG</div><div class="forms-grid">Positiv: ${card.word}<br>Komparativ: ${d.comparative}<br>Superlativ: ${d.superlative}</div>`;
    }
    else if (card.type === "Redewendung") {
      const d = card.details;
      html += `<div class="badge">🔤 IDIOM / REDEWENDUNG</div>`;
      html += `<div class="section-label">📖 BEDEUTUNG</div><div class="forms-grid">${d.meaning}</div>`;
    }
    return html;
  }

  // Rückseite Persisch
  function renderBack(card) {
    const d = card.details;
    let persianWord = "";
    let persianExample = "";
    if (card.type === "Redewendung") {
      persianWord = d.persian;
      persianExample = d.persianExample;
    } else if (card.type === "Verb" || card.type === "Nomen" || card.type === "Adjektiv") {
      persianWord = d.persian;
      persianExample = d.persianExample;
    } else {
      persianWord = d.persian || "ترجمه";
      persianExample = d.persianExample || "مثال";
    }
    let html = `<div class="persian-word">${persianWord}</div>`;
    html += `<div class="section-label" style="text-align:right">📘 مثال</div><div class="persian-example">${persianExample}</div>`;
    if(card.type === "Redewendung") html += `<div class="small-note">🌟 اصطلاح رایج</div>`;
    return html;
  }

  function updateCard() {
    const card = cardsData[currentIndex];
    frontDiv.innerHTML = renderFront(card);
    backDiv.innerHTML = renderBack(card);
    // Karte nicht geflippt lassen beim Wechsel (Vorderseite zeigen)
    cardElement.classList.remove('flipped');
    counterSpan.innerText = `Karte ${currentIndex+1} / ${cardsData.length}   ${randomMode ? "🔀 Zufallsmodus an" : ""}`;
  }

  function nextCard() {
    if (randomMode) {
      let newIndex;
      do { newIndex = Math.floor(Math.random() * cardsData.length); } while (newIndex === currentIndex && cardsData.length > 1);
      currentIndex = newIndex;
    } else {
      currentIndex = (currentIndex + 1) % cardsData.length;
    }
    updateCard();
  }

  function prevCard() {
    if (randomMode) {
      let newIndex;
      do { newIndex = Math.floor(Math.random() * cardsData.length); } while (newIndex === currentIndex && cardsData.length > 1);
      currentIndex = newIndex;
    } else {
      currentIndex = (currentIndex - 1 + cardsData.length) % cardsData.length;
    }
    updateCard();
  }

  function randomCard() {
    let newIndex;
    do { newIndex = Math.floor(Math.random() * cardsData.length); } while (newIndex === currentIndex && cardsData.length > 1);
    currentIndex = newIndex;
    updateCard();
  }

  function toggleRandomMode(event) {
    // Rechtsklick auf Zufallsbutton
    if (event.button === 2) { 
      event.preventDefault();
      randomMode = !randomMode;
      const btn = document.getElementById('randomBtn');
      if(randomMode) {
        btn.style.background = "#e6b42230";
        btn.style.border = "1px solid #e6b422";
      } else {
        btn.style.background = "#1e2533";
        btn.style.border = "1px solid #e6b42240";
      }
      counterSpan.innerText = `Karte ${currentIndex+1} / ${cardsData.length}   ${randomMode ? "🔀 Zufallsmodus an" : ""}`;
    }
  }

  // Karte umdrehen per Klick
  function flipCard() {
    cardElement.classList.toggle('flipped');
  }

  // Event bindings
  document.getElementById('prevBtn').addEventListener('click', prevCard);
  document.getElementById('nextBtn').addEventListener('click', nextCard);
  const randomBtn = document.getElementById('randomBtn');
  randomBtn.addEventListener('click', randomCard);
  randomBtn.addEventListener('contextmenu', toggleRandomMode);
  cardElement.addEventListener('click', flipCard);

  // initial
  updateCard();
</script>
</body>
</html>
